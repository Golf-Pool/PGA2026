<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGA Championship Pool — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0a1628;
    --navy-mid:   #1a2e4a;
    --navy-light: #2a4a72;
    --gold:       #b8965a;
    --gold-light: #d4b07a;
    --silver:     #c8d4e0;
    --cream:      #f4f0e8;
    --cream-dark: #e8e0cc;
    --white:      #ffffff;
    --text-dark:  #1a1a1a;
    --text-mid:   #3d3d3d;
    --text-muted: #6a6e7a;
    --red:        #b5302a;
    --wanamaker:  #8b7355;
  }

  body {
    background: var(--navy);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,150,90,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(184,150,90,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,46,74,0.4) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .header-badge {
    display: inline-block;
    border: 1px solid rgba(184,150,90,0.4);
    color: var(--gold-light);
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 6px 20px;
    margin-bottom: 20px;
  }

  /* Wanamaker Trophy SVG icon above title */
  .trophy-icon {
    display: block;
    margin: 0 auto 12px;
    opacity: 0.55;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 7vw, 68px);
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .header h1 span { color: var(--gold); }

  .header-venue {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(184,150,90,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .annual {
    font-style: italic;
    font-size: 13px;
    color: rgba(184,150,90,0.4);
    margin-top: 4px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(244,240,232,0.5);
    margin-top: 10px;
    letter-spacing: 0.02em;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .cut-legend {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
    text-align: center;
  }
  .cut-legend.visible {
    display: flex !important;
    flex-wrap: wrap !important;
    justify-content: center !important;
    align-items: center !important;
    gap: 10px !important;
  }
  .cut-badge {
    font-size: 12px;
    color: rgba(244,240,232,0.4);
    font-style: italic;
    border: 1px solid rgba(184,150,90,0.2);
    padding: 3px 12px;
    border-radius: 10px;
  }
  .legend-pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    border: 1px solid;
  }
  .mobile-only { display: none; }
  @media(max-width:700px){ .mobile-only { display: inline-block; } }
  .legend-pill.safe   { background: rgba(60,160,90,0.2);   color: #6ee090; border-color: rgba(60,160,90,0.25); }
  .legend-pill.bubble { background: rgba(200,160,40,0.25); color: #e8c97a; border-color: rgba(200,160,40,0.3); }
  .legend-pill.danger { background: rgba(180,60,60,0.25);  color: #e07070; border-color: rgba(180,60,60,0.3); }

  #day-badge-container { margin-top: -8px; }

  .day-badge {
    display: inline-block;
    text-align: center;
    margin-top: 0;
  }
  .day-badge-label {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(184,150,90,0.5);
    margin-bottom: 5px;
  }
  .day-badge-rule {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,150,90,0.3), transparent);
    margin: 8px auto;
  }
  .day-badge-main {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    display: block;
  }
  .day-badge-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 15px;
    font-weight: 300;
    color: rgba(244,240,232,0.4);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .defending-champ {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(184,150,90,0.5);
    letter-spacing: 0.06em;
    margin-top: 14px;
    text-align: center;
  }
  .defending-champ strong {
    color: rgba(184,150,90,0.85);
    font-style: normal;
    font-weight: 400;
  }

  .live-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(244,240,232,0.5);
  }
  .live-dot.active { color: #5ecb7a; }
  .live-dot::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s infinite;
  }
  .live-dot.active::before  { background: #5ecb7a; box-shadow: 0 0 8px #5ecb7a; }
  .live-dot.loading::before { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .live-dot.error::before   { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }

  .last-updated {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(244,240,232,0.35);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .scoreboard { animation: fadeUp 0.8s 0.5s ease both; }

  .col-headers {
    display: grid;
    grid-template-columns: 60px 1fr 80px 140px repeat(5, 1fr);
    gap: 0;
    padding: 0 24px 10px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(184,150,90,0.6);
    border-bottom: 1px solid rgba(184,150,90,0.15);
    margin-bottom: 12px;
  }
  .col-headers .picks-header {
    grid-column: span 5;
    text-align: center;
  }
  @media(max-width:700px){ .col-headers { display: none; } }

  .player-row {
    background: rgba(26,46,74,0.35);
    border: 1px solid rgba(184,150,90,0.1);
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeUp 0.5s ease both;
    overflow: hidden;
  }
  .player-row:hover {
    border-color: rgba(184,150,90,0.3);
    background: rgba(42,74,114,0.45);
  }
  .player-row.first-place {
    background: linear-gradient(135deg, rgba(184,150,90,0.18) 0%, rgba(26,46,74,0.5) 100%);
    border-color: rgba(184,150,90,0.45);
  }
  .player-row.first-place:hover {
    border-color: rgba(184,150,90,0.7);
  }
  .player-row.eliminated {
    opacity: 0.5;
  }

  .row-main {
    display: grid;
    grid-template-columns: 60px 1fr 80px 140px repeat(5, 1fr);
    align-items: center;
    gap: 0;
    padding: 14px 24px;
  }

  .place {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.02em;
  }
  .first-place .place { color: var(--gold); font-size: 22px; }

  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.01em;
    position: relative;
  }
  .first-place .player-name { font-size: 20px; }

  .champ-year {
    display: inline-block;
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--gold);
    border: 1px solid rgba(184,150,90,0.4);
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .row-chevron {
    font-size: 9px;
    color: rgba(184,150,90,0.35);
    margin-left: 8px;
    transition: transform 0.2s;
    display: none;
  }
  @media(min-width:701px){ .row-chevron { display: inline; } }
  .player-row.expanded .row-chevron { transform: rotate(180deg); }

  .score {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
  }
  .score.under { color: #6ee090; }
  .score.over  { color: #e07070; }
  .score.even  { color: var(--silver); }
  .first-place .score { font-size: 24px; }

  .outlook {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(244,240,232,0.45);
    padding: 0 8px;
    text-align: center;
    display: none;
  }

  .golfer-cell {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    color: rgba(244,240,232,0.55);
    text-align: center;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 4px;
  }
  .first-place .golfer-cell { color: rgba(244,240,232,0.75); }

  .golfer-expand {
    display: none;
    padding: 0 24px 16px;
    border-top: 1px solid rgba(184,150,90,0.1);
    margin-top: 0;
  }
  .player-row.expanded .golfer-expand { display: block; }

  .golfer-expand-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 14px;
  }
  .ge-card {
    flex: 1;
    min-width: 120px;
    background: rgba(10,22,40,0.5);
    border: 1px solid rgba(184,150,90,0.15);
    border-radius: 6px;
    padding: 10px 14px;
    text-align: center;
  }
  .ge-name {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    color: rgba(244,240,232,0.7);
    margin-bottom: 4px;
  }
  .ge-score {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
  }
  .ge-score.under { color: #6ee090; }
  .ge-score.over  { color: #e07070; }
  .ge-score.even  { color: var(--silver); }

  /* Mobile picks */
  .mobile-picks {
    display: none;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .m-pick {
    font-family: 'Crimson Pro', serif;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(184,150,90,0.2);
    color: rgba(244,240,232,0.6);
  }
  .m-pick-score {
    margin-left: 4px;
    font-weight: 600;
  }
  .m-pick-score.under { color: #6ee090; }
  .m-pick-score.over  { color: #e07070; }
  .m-pick-score.even  { color: var(--silver); }

  @media(max-width:700px) {
    .row-main {
      grid-template-columns: 50px 1fr 65px;
      padding: 12px 16px;
    }
    .outlook, .golfer-cell { display: none !important; }
    .mobile-picks { display: flex; }
    .golfer-expand { padding: 0 16px 14px; }
    .player-row { cursor: default; }
    .player-row.expanded .golfer-expand { display: none; }
  }

  /* Payout banner */
  .payout-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
    border: 1px solid rgba(184,150,90,0.2);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .payout-item {
    flex: 1;
    text-align: center;
    padding: 14px 10px;
    border-right: 1px solid rgba(184,150,90,0.15);
    background: rgba(26,46,74,0.3);
  }
  .payout-item:last-child { border-right: none; }
  .payout-place {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(184,150,90,0.5);
    margin-bottom: 4px;
  }
  .payout-amount {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
  }
  .payout-pct {
    font-size: 11px;
    color: rgba(244,240,232,0.3);
    margin-top: 2px;
  }

  /* Course info strip */
  .course-strip {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 14px 24px;
    border: 1px solid rgba(184,150,90,0.12);
    border-radius: 6px;
    background: rgba(10,22,40,0.3);
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .course-stat {
    text-align: center;
  }
  .course-stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(184,150,90,0.45);
    margin-bottom: 3px;
  }
  .course-stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: rgba(244,240,232,0.7);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <svg width="72" height="88" viewBox="0 0 44 56" fill="none" xmlns="http://www.w3.org/2000/svg" class="trophy-icon">
      <path d="M12 4 L10 22 Q10 32 22 35 Q34 32 34 22 L32 4 Z" fill="#b8965a"/>
      <path d="M10 8 Q2 8 2 16 Q2 24 10 24" stroke="#b8965a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M34 8 Q42 8 42 16 Q42 24 34 24" stroke="#b8965a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="19" y="35" width="6" height="10" fill="#b8965a"/>
      <rect x="12" y="45" width="20" height="4" rx="1" fill="#d4b07a"/>
      <rect x="9" y="49" width="26" height="5" rx="1.5" fill="#b8965a"/>
      <path d="M16 8 L15 26" stroke="rgba(212,176,122,0.35)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <div class="header-badge">First Annual</div>
    <h1>PGA <span>Championship</span> Pool</h1>
    <div class="header-venue">Aronimink Golf Club &nbsp;·&nbsp; Newtown Square, PA</div>
    <div class="divider"></div>

    <div style="margin-top:18px;" id="day-badge-container"></div>
  </div>

  <!-- Live bar -->
  <div class="live-bar">
    <div class="live-dot loading" id="live-status">Fetching scores</div>
    <div class="last-updated" id="last-updated"></div>
  </div>

  <!-- Payout bar -->
  <div class="payout-bar">
    <div class="payout-item">
      <div class="payout-place">🏆 1st Place</div>
      <div class="payout-amount" id="payout-1">—</div>
      <div class="payout-pct">65%</div>
    </div>
    <div class="payout-item">
      <div class="payout-place">🥈 2nd Place</div>
      <div class="payout-amount" id="payout-2">—</div>
      <div class="payout-pct">25%</div>
    </div>
    <div class="payout-item">
      <div class="payout-place">🥉 3rd Place</div>
      <div class="payout-amount" id="payout-3">—</div>
      <div class="payout-pct">10%</div>
    </div>
  </div>

  <!-- Cut legend -->
  <div class="cut-legend" id="cut-legend">
    <span class="cut-badge" id="cut-badge"></span>
    <span class="legend-pill safe">Making cut</span>
    <span class="legend-pill bubble">On the bubble</span>
    <span class="legend-pill danger">Missing cut</span>
    <span class="legend-pill danger mobile-only">CUT</span>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="col-headers">
      <div>Pos</div>
      <div>Participant</div>
      <div style="text-align:center">Score</div>
      <div class="outlook-header" style="text-align:center;display:none">Outlook</div>
      <div class="picks-header">Picks</div>
    </div>
    <div id="rows"></div>
  </div>

</div>

<script>
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ1BUGRMPu_1cew3ekSeCU8EDHb34Ug7RjBqs_Ie9_gYeZDkOQBrTExVm2AFCmtMqNctIi_73XYsb2/pub?gid=0&single=true&output=csv';
var lastGoodRows = null;

function parseLine(line) {
  var cols = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"' && !inQ) { inQ = true; }
    else if (c === '"' && inQ) { inQ = false; }
    else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.trim());
  return cols;
}

var projectedCut = null;

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var firstRow = parseLine(lines[0]);
  var rawCut = firstRow[0].replace(/["\'\s]/g, '');
  var cutVal = parseFloat(rawCut);
  projectedCut = isNaN(cutVal) ? null : cutVal;
  var startIdx = 0;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].toLowerCase();
    if (l.match(/^"?1st/)) { startIdx = i; break; }
    if (l.indexOf('place') === 0) { startIdx = i + 1; break; }
  }
  return lines.slice(startIdx).map(function(line) {
    return parseLine(line);
  }).filter(function(r) { return r[1] && r[1].trim(); });
}

function scoreClass(s) {
  if (!s || s === 'E' || s === '0') return 'even';
  var n = parseInt(s);
  if (isNaN(n)) return 'even';
  return n < 0 ? 'under' : 'over';
}

function formatScore(s, isElim) {
  if (!s) return isElim ? 'CUT' : 'E';
  var n = parseInt(s);
  if (isNaN(n)) return s;
  if (n === 999) return 'CUT';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : String(n);
}

function render(rows) {
  var container = document.getElementById('rows');
  container.innerHTML = '';
  rows.forEach(function(row, i) {
    var place   = row[0] || '';
    var name    = row[1] || '';
    var score   = row[2] || '';
    var outlook = row[3] || '';
    var golferNames = [row[4], row[5], row[6], row[7], row[8]];
    var champYear = row[9] || '';
    var golfers = golferNames.map(function(g) { return g || '-'; });
    var isFirst = place.trim() === '1st';
    var isElim  = place.trim() === '—' || place.trim() === '-' || place.trim() === '';
    var div = document.createElement('div');
    div.className = 'player-row' + (isFirst ? ' first-place' : '') + (isElim ? ' eliminated' : '');
    div.style.animationDelay = (i * 0.07) + 's';
    var sc = scoreClass(score);

    var golferScores = [row[10], row[11], row[12], row[13], row[14]].map(function(s) {
      var n = parseFloat(s);
      return isNaN(n) ? null : n;
    });

    var mobilePicks = golferNames.map(function(g, idx) {
      if (!g || g === '-') return '';
      var parts = g.trim().split(' ');
      var last = parts[parts.length - 1];
      var gs = golferScores[idx];
      var pillStyle = '';
      var scoreHtml = '';
      if (projectedCut !== null && gs !== null) {
        if (gs >= 999 || gs > projectedCut) {
          pillStyle = 'background:rgba(180,60,60,0.25);color:#e07070;border-color:rgba(180,60,60,0.3);';
        } else if (gs === projectedCut) {
          pillStyle = 'background:rgba(200,160,40,0.25);color:#e8c97a;border-color:rgba(200,160,40,0.3);';
        } else {
          pillStyle = 'background:rgba(60,160,90,0.2);color:#6ee090;border-color:rgba(60,160,90,0.25);';
        }
      }
      if (gs !== null) {
        var sc2 = gs < 0 ? 'under' : gs > 0 ? 'over' : 'even';
        var sl  = gs === 0 ? 'E' : (gs > 0 ? '+' + gs : '' + gs);
        if (gs >= 999) { sc2 = 'over'; sl = 'CUT'; }
        scoreHtml = '<span class="m-pick-score ' + sc2 + '">' + sl + '</span>';
      }
      return '<span class="m-pick" style="' + pillStyle + '">' + last + scoreHtml + '</span>';
    }).filter(Boolean).join('');

    var expandCards = golferNames.map(function(g, idx) {
      if (!g || g === '-') return '';
      var gs = golferScores[idx];
      var sc2 = 'even', sl = 'E';
      if (gs !== null) {
        if (gs >= 999)   { sc2 = 'over';  sl = 'CUT'; }
        else if (gs < 0) { sc2 = 'under'; sl = '' + gs; }
        else if (gs > 0) { sc2 = 'over';  sl = '+' + gs; }
      }
      return '<div class="ge-card"><div class="ge-name">' + g + '</div><div class="ge-score ' + sc2 + '">' + sl + '</div></div>';
    }).filter(Boolean).join('');

    div.innerHTML =
      '<div class="row-main">' +
        '<div class="place">' + place + '</div>' +
        '<div class="player-name">' + name +
          (champYear ? '<span class="champ-year">' + champYear + '</span>' : '') +
          '<span class="row-chevron">&#9660;</span>' +
          '<div class="mobile-picks">' + mobilePicks + '</div>' +
        '</div>' +
        '<div class="score ' + sc + '">' + formatScore(score, isElim) + '</div>' +
        '<div class="outlook">' + outlook + '</div>' +
        golfers.map(function(g) { return '<div class="golfer-cell">' + g + '</div>'; }).join('') +
      '</div>' +
      '<div class="golfer-expand"><div class="golfer-expand-grid">' + expandCards + '</div></div>';

    div.addEventListener('click', function() {
      if (window.innerWidth > 700) div.classList.toggle('expanded');
    });
    container.appendChild(div);
  });
}

function setStatus(state, msg) {
  var el = document.getElementById('live-status');
  el.className = 'live-dot ' + state;
  el.textContent = msg;
}

function setUpdated() {
  var el = document.getElementById('last-updated');
  var now = new Date();
  el.textContent = 'Updated ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function fetchData() {
  setStatus('loading', 'Fetching scores');
  fetch(CSV_URL + '&t=' + Date.now())
    .then(function(res) {
      if (!res.ok) throw new Error('Network error');
      return res.arrayBuffer();
    })
    .then(function(buffer) {
      var text = new TextDecoder('utf-8').decode(buffer);
      var rows = parseCSV(text);
      if (!rows.length) throw new Error('No data');
      var allE = rows.every(function(r) {
        var s = (r[2] || '').trim();
        return s === '' || s === 'E' || s === '0';
      });
      if (allE && lastGoodRows) { rows = lastGoodRows; }
      else if (!allE) { lastGoodRows = rows; }
      render(rows);

      var entryFee = 50;
      var totalPot = rows.length * entryFee;
      var fmt = function(n) { return '$' + Math.round(n).toLocaleString(); };
      document.getElementById('payout-1').textContent = fmt(totalPot * 0.65);
      document.getElementById('payout-2').textContent = fmt(totalPot * 0.25);
      document.getElementById('payout-3').textContent = fmt(totalPot * 0.10);

      var hasOutlook = rows.some(function(r) { return r[3] && r[3].trim() !== ''; });
      var legend = document.getElementById('cut-legend');
      var cutBadge = document.getElementById('cut-badge');
      if (projectedCut !== null) {
        legend.className = 'cut-legend visible';
        var cutDisplay = projectedCut === 0 ? 'E' : (projectedCut > 0 ? '+' + projectedCut : String(projectedCut));
        cutBadge.textContent = 'Projected cut: ' + cutDisplay;
      } else {
        legend.className = 'cut-legend';
      }
      var ohdr = document.querySelector('.outlook-header');
      var ocols = document.querySelectorAll('.outlook');
      if (ohdr) ohdr.style.display = hasOutlook ? '' : 'none';
      ocols.forEach(function(el) { el.style.display = hasOutlook ? '' : 'none'; });

      setStatus('active', 'Live');
      setUpdated();
    })
    .catch(function() {
      setStatus('error', 'Could not load');
      document.getElementById('rows').innerHTML =
        '<div style="text-align:center;padding:40px;color:rgba(244,240,232,0.35);font-style:italic;">Unable to fetch scores. Retrying shortly...</div>';
    });
}

function renderDayBadge() {
  var container = document.getElementById('day-badge-container');
  var day = new Date().getDay();
  var label, main, sub;

  if (day === 4) {
    label = 'Thursday &middot; Round 1';
    main  = null;
    sub   = null;
  } else if (day === 5) {
    label = 'Friday &middot; Round 2';
    main  = 'Cut Day';
    sub   = null;
  } else if (day === 6) {
    label = 'Saturday &middot; Round 3';
    main  = 'Moving Day';
    sub   = 'Time to climb';
  } else if (day === 0) {
    label = 'Round 4';
    main  = 'Wanamaker Sunday';
    sub   = null;
  } else {
    container.innerHTML = '';
    return;
  }

  container.innerHTML =
    '<div class="day-badge">' +
      '<div class="day-badge-label">' + label + '</div>' +
      '<div class="day-badge-rule"></div>' +
      (main ? '<span class="day-badge-main">' + main + '</span>' : '') +
      (main ? '<div class="day-badge-rule"></div>' : '') +
      (sub ? '<div class="day-badge-sub">' + sub + '</div>' : '') +
    '</div>';
}

renderDayBadge();
fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
